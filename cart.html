<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restaurant Cart</title>

  <!-- styles can be moved to cart.css -->
  <link rel="stylesheet" href="cart.css">
</head>
<body>

<div class="cart-container">
  <h1>Your Cart</h1>

  <ul class="cart-items" id="cartItems">
    <!-- items injected by JavaScript -->
  </ul>

  <div class="summary" id="summary">
    <!-- subtotal/tax/total populated by JavaScript -->
  </div>

  <button class="checkout-btn" id="checkoutBtn" disabled>Proceed to Checkout</button>
</div>

<!-- scripts can be moved to cart.js -->
<script src="cart.js"></script>
</body>
</html>
